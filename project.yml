name: TidbitsTrivia
options:
  bundleIdPrefix: com.learningischange
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
  groupSortPosition: top
configFiles:
  Debug: AppVersion.xcconfig
  Release: AppVersion.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Approachable concurrency: code is MainActor-isolated by default so
    # SwiftUI views and @Observable stores need no annotation; networking
    # and the corpus reader opt out with `nonisolated`. (Xcode 26+.)
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    DEVELOPMENT_TEAM: L2G756LY8N
    CODE_SIGN_STYLE: Automatic
targets:
  TidbitsTrivia:
    type: application
    supportedDestinations: [iOS, tvOS]
    sources:
      - path: TidbitsTrivia
    # Game Center capability — the entitlement makes GameCenterManager.authenticate()
    # work; leaderboard IDs must be created in App Store Connect (owner step).
    # Automatic signing adds the capability to the App ID on first archive.
    entitlements:
      path: TidbitsTrivia/TidbitsTrivia.entitlements
      properties:
        com.apple.developer.game-center: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.learningischange.tidbitstrivia
        PRODUCT_NAME: TidbitsTrivia
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1,2,3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      # Explicit Info.plist (xcodegen fills the standard CFBundle* keys) so we
      # can ship a BRANDED launch screen (cream background + centered logo)
      # instead of the auto-generated white one. UILaunchScreen is iOS-only;
      # tvOS ignores it and launches from the brand asset.
      path: TidbitsTrivia/Info.plist
      properties:
        CFBundleDisplayName: Tidbits
        # Tidbits is a fixed "cream paper" design with NO dark-mode variants, so
        # force light everywhere — otherwise a dark-mode iPhone inverts default
        # text to white (white-on-cream) and system surfaces to dark
        # (dark-on-dark on Records). This is the single biggest legibility fix.
        UIUserInterfaceStyle: Light
        # Export compliance: Tidbits uses only standard HTTPS (Wikipedia API) —
        # exempt encryption. Declaring this skips the manual compliance question
        # on every TestFlight / App Store build.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
      configs:
        # Debug stays unsigned so simulator / CI builds need no team or certs.
        Debug:
          CODE_SIGNING_ALLOWED: NO
        # Release IS signed — a TestFlight/App Store archive requires it.
        # Automatic signing (set in base settings) picks the profile once
        # DEVELOPMENT_TEAM is filled in (see the OWNER checklist).
        Release:
          CODE_SIGNING_ALLOWED: YES
