# Android CI — symmetric with Xcode Cloud (which watches the iOS
# project). PR runs build + tests; tag push runs release bundle +
# Play Store upload.
#
# Required GH Secrets:
#   GOOGLE_WEB_CLIENT_ID         — for Sign in with Google one-tap
#   KEYSTORE_BASE64              — `base64 -i upload.jks | pbcopy`
#   KEYSTORE_PASSWORD            — upload-key store password
#   KEY_ALIAS                    — upload-key alias
#   KEY_PASSWORD                 — upload-key password
#   PLAY_SERVICE_ACCOUNT_JSON    — Play Console API service-account JSON

name: Android Build

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  push:
    branches: [main]
    tags:
      - 'v*-android'
    # No paths: filter on push — tag pushes carry no file diff, so a
    # paths filter would suppress the release job. Job-level `if:`
    # blocks below gate which steps run per event.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Write gradle.properties secrets
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" >> gradle.properties

      - name: Build debug + unit tests
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon

      - name: Reconstruct upload keystore (release only)
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-android')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/upload.jks
          cat >> gradle.properties <<EOF
          UPLOAD_KEYSTORE_PATH=keystore/upload.jks
          UPLOAD_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD
          UPLOAD_KEY_ALIAS=$KEY_ALIAS
          UPLOAD_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      - name: Build release bundle
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-android')
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB to Play Console (internal track)
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-android')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.appname   # FILL IN
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
