name: TidbitsTrivia
options:
  bundleIdPrefix: com.learningischange
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
  groupSortPosition: top
configFiles:
  Debug: AppVersion.xcconfig
  Release: AppVersion.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Approachable concurrency: code is MainActor-isolated by default so
    # SwiftUI views and @Observable stores need no annotation; networking
    # and the corpus reader opt out with `nonisolated`. (Xcode 26+.)
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    DEVELOPMENT_TEAM: L2G756LY8N
    CODE_SIGN_STYLE: Automatic
targets:
  TidbitsTrivia:
    type: application
    # Universal iOS + tvOS target (Decision 013). The tvOS slice now ships its
    # required layered App Icon + Top Shelf via the
    # "App Icon & Top Shelf Image.brandassets" set (resolves the ITMS-90513
    # CFBundleIcons / TVTopShelfImage validation errors). Per-platform UI is
    # guarded by #if os(iOS) / #if os(tvOS).
    supportedDestinations: [iOS, tvOS]
    sources:
      - path: TidbitsTrivia
    # Game Center capability — the entitlement makes GameCenterManager.authenticate()
    # work; leaderboard IDs must be created in App Store Connect (owner step).
    # Automatic signing adds the capability to the App ID on first archive.
    entitlements:
      path: TidbitsTrivia/TidbitsTrivia.entitlements
      properties:
        com.apple.developer.game-center: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.learningischange.tidbitstrivia
        PRODUCT_NAME: TidbitsTrivia
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION come ONLY from
        # AppVersion.xcconfig (the single source of truth). Target-level copies
        # here would SHADOW the xcconfig — every build silently stayed at 1(1).
        # TARGETED_DEVICE_FAMILY is derived from supportedDestinations
        # (iOS→1,2 + tvOS→3); setting it here would override tvOS and break it.
        # iOS uses the flat AppIcon.appiconset; tvOS needs the layered brand
        # asset (square appiconset is invalid on tvOS), so the icon name is
        # SDK-conditional.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=appletvos*]": "App Icon & Top Shelf Image"
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=appletvsimulator*]": "App Icon & Top Shelf Image"
        # The branded launch storyboard is iOS-only — tvOS rejects an iOS
        # launchScreen storyboard ("does not support target device type tv")
        # and launches from its brand asset. Exclude the file from the tvOS
        # slice so the universal target still builds for tvOS.
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=appletvos*]": "LaunchScreen.storyboard"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=appletvsimulator*]": "LaunchScreen.storyboard"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      # Explicit Info.plist (xcodegen fills the standard CFBundle* keys) so we
      # can ship a BRANDED launch screen via LaunchScreen.storyboard: coral
      # fills the screen, brand dots are strewn full-bleed (LaunchDots,
      # aspectFill), and the icon tile is centered (LaunchIcon) — the splash
      # reads as a zoomed-out app icon. A storyboard (not the minimal
      # UILaunchScreen dict) is required because that dict can't scatter
      # full-bleed dots — only a solid color + one centered image.
      path: TidbitsTrivia/Info.plist
      properties:
        CFBundleDisplayName: Tidbits
        # Bind the Info.plist version keys to the build-setting variables so they
        # resolve from AppVersion.xcconfig — without this xcodegen wrote literal
        # "1"/"1.0" into the plist, freezing every build at 1(1).
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        # Tidbits is a fixed "cream paper" design with NO dark-mode variants, so
        # force light everywhere — otherwise a dark-mode iPhone inverts default
        # text to white (white-on-cream) and system surfaces to dark
        # (dark-on-dark on Records). This is the single biggest legibility fix.
        UIUserInterfaceStyle: Light
        # Export compliance: Tidbits uses only standard HTTPS (Wikipedia API) —
        # exempt encryption. Declaring this skips the manual compliance question
        # on every TestFlight / App Store build.
        ITSAppUsesNonExemptEncryption: false
        # Phase-1 phone-as-buzzer (Decision 030): the TV advertises and phones
        # browse a room-code-PSK Bonjour service over the LAN. iOS 14+ shows the
        # local-network prompt on first use; tvOS needs the same declaration to
        # publish. Network.framework requires every Bonjour type be declared.
        NSLocalNetworkUsageDescription: "Tidbits uses your local network so phones in the room can act as buzzers for the TV — no internet required."
        NSBonjourServices:
          - "_tidbits-buzz._tcp"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
      configs:
        # Debug stays unsigned so simulator / CI builds need no team or certs.
        Debug:
          CODE_SIGNING_ALLOWED: NO
        # Release IS signed — a TestFlight/App Store archive requires it.
        # Automatic signing (set in base settings) picks the profile once
        # DEVELOPMENT_TEAM is filled in (see the OWNER checklist).
        Release:
          CODE_SIGNING_ALLOWED: YES
