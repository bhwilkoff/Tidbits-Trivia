<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Name</title>
  <!-- PWA / iOS Safari standalone support.
       NO viewport-fit=cover — Safari auto-clips to safe area without it.
       NO position:fixed overlays — they break Safari's compositor at the
       Dynamic Island. See css/styles.css comment on body flex-column. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="App Name">
  <meta name="theme-color" content="#0047FF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#080810" media="(prefers-color-scheme: dark)">

  <!-- Open Graph — read by Discord / iMessage / Slack / Bluesky / Mastodon
       / Threads (and every other major link-preview consumer). Mirror in
       per-view <title> updates from js/app.js. -->
  <meta property="og:title" content="App Name">
  <meta property="og:description" content="Your tagline here">
  <meta property="og:type" content="website">
  <!-- <meta property="og:image" content="https://example.com/og-image.png"> -->

  <!-- Smart App Banner — uncomment after App Store / Play Store ship.
       iOS uses meta tag; Android uses Digital Asset Links + Chrome
       install prompt (handled via /.well-known/assetlinks.json). -->
  <!-- <meta name="apple-itunes-app" content="app-id=YOUR_APP_ID"> -->

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Skip link for keyboard navigation (WCAG AA) -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- AUTH SCREEN — shown when no session -->
  <div id="auth-screen" class="screen" aria-label="Sign in">
    <div class="auth-card">
      <h1 class="auth-title">App Name</h1>
      <p class="auth-subtitle">Your tagline here</p>
      <form id="auth-form" novalidate>
        <div class="field-group">
          <label for="auth-handle" class="field-label">Handle</label>
          <input type="text" id="auth-handle" class="field-input" placeholder="you@example.com" required>
        </div>
        <div class="field-group">
          <label for="auth-password" class="field-label">Password</label>
          <input type="password" id="auth-password" class="field-input" required>
        </div>
        <div id="auth-error" class="error-banner" hidden role="alert"></div>
        <button type="submit" class="btn btn-primary btn-full" id="auth-submit">Sign in</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP — shown when authenticated -->
  <div id="app-screen" class="screen" hidden>

    <!-- SIDEBAR -->
    <aside id="channels-sidebar" class="channels-sidebar" aria-label="Navigation">
      <div class="sidebar-header">
        <h2 class="sidebar-title">App Name</h2>
      </div>
      <nav class="sidebar-nav" aria-label="Main navigation">
        <!-- Add nav items here. Pattern: -->
        <!-- <button class="sidebar-nav-item active" id="nav-home-btn" data-view="home">
          <svg>...</svg><span>Home</span>
        </button> -->
      </nav>
    </aside>

    <!-- VIEWS — one section per view, toggled by showView() -->
    <main id="main-content">
      <section id="view-home" class="view" aria-label="Home">
        <div class="view-inner">
          <h2 class="view-heading">Home</h2>
          <p>Your first view goes here.</p>
        </div>
      </section>
    </main>

  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
