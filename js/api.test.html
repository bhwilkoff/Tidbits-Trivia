<!DOCTYPE html>
<!--
  Vanilla in-browser test runner — open this in a browser to run
  js/api.test.js without any tooling. Same pattern as iOS xctest
  and Android JUnit — minimum surface so adding tests is friction-
  free.

  Run:  python3 -m http.server 8080  →  open http://localhost:8080/js/api.test.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Tests</title>
  <style>body { font-family: monospace; padding: 24px; } pre { padding: 12px; background: #f5f5f5; }</style>
</head>
<body>
  <h1>API Tests</h1>
  <script src="api.js"></script>
  <script src="api.test.js"></script>
</body>
</html>
