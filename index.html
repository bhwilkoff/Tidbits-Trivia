<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=auto">
  <title>Tidbits Trivia</title>
  <meta name="description" content="Trivia from the whole of Wikipedia. Play solo, keep a daily streak, or pass the phone.">
  <link rel="canonical" href="https://tidbitstrivia.com/">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tidbits">
  <meta name="theme-color" content="#FBF3E4">
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <!-- Social preview — every shared score links back to tidbitstrivia.com -->
  <meta property="og:site_name" content="Tidbits Trivia">
  <meta property="og:title" content="Tidbits Trivia">
  <meta property="og:description" content="Trivia from the whole of Wikipedia — and every question is a door to learn more.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tidbitstrivia.com/">
  <meta property="og:image" content="https://tidbitstrivia.com/assets/icon.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tidbits Trivia">
  <meta name="twitter:description" content="Trivia from the whole of Wikipedia — and every question is a door to learn more.">
  <meta name="twitter:image" content="https://tidbitstrivia.com/assets/icon.png">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>
  <div id="app" role="main" aria-label="Tidbits Trivia"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // updateViaCache:'none' — ALWAYS re-fetch sw.js (the browser otherwise
          // serves it from HTTP cache up to 24h, so a new worker never installs
          // and the app stays frozen on a stale corpus). Force an update check,
          // and reload once when a new worker takes control.
          const reg = await navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' });
          reg.update();
          let reloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloaded) return; reloaded = true; location.reload();
          });
        } catch (e) { /* no-op */ }
      });
    }
  </script>
</body>
</html>
